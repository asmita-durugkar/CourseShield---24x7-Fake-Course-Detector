version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: courseshield
      POSTGRES_PASSWORD: courseshield123
      POSTGRES_DB: courseshield
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://courseshield:courseshield123@postgres:5432/courseshield
    depends_on:
      - redis
      - postgres
    restart: always

volumes:
  redis_data:
  postgres_data: